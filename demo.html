<!DOCTYPE html>
<title>Perlin noise</title>
<style>
.centerbox {
  /* flexbox, por favor */
  display: -webkit-box;
  -webkit-box-orient: horizontal;
  -webkit-box-pack: center;
  -webkit-box-align: center;

  display: -moz-box;
  -moz-box-orient: horizontal;
  -moz-box-pack: center;
  -moz-box-align: center;

  width: 100%;
  height: 100%;
  margin: 0; padding: 0;
}
body, html { width: 100%; height: 100%; padding: 0; margin: 0; }
canvas {
  /* border-radius: 30px;  Border radiuses don't seem to work with putImageData */
  box-shadow: 0 0 10px #777;
  width: 1920px;
  height: 1080px;
}
body {
  background-color: #eee;
}
</style>
<div class='centerbox'><canvas></canvas></div>
<script src='perlin.js'></script>
<script>
var canvas = document.getElementsByTagName('canvas')[0];
canvas.width = 524;
canvas.height = 708;

var ctx = canvas.getContext('2d');

var image = ctx.createImageData(canvas.width, canvas.height);
var data = image.data;

var start = Date.now();

for (var x = 0; x < canvas.width; x++) {
  //if (x % 100 == 0) {
  //  noise.seed(Math.random());
  //}
  for (var y = 0; y < canvas.height; y++) {
    var value = Math.abs(noise.perlin2(x / 100, y / 100));
    value *= 425;
    var landValue = [value,value,value]
    if (value < 15){
      landValue = [0,0,50]
    };
    if (value > 15 && value < 40){
      landValue = [0,0,125]
    };
        if (value > 40 && value < 55){
      landValue = [0,0,200]
    }
    if (value > 55 && value < 60){
      landValue = [0,0,255]
    }
    if (value > 60 && value < 70){
      landValue = [255,255,0]
    }
        if (value > 70 && value < 140){
      landValue = [0,200,0]
    }
            if (value > 140){
      landValue = [25,25,25]
    }


    var cell = (x + y * canvas.width) * 4;
    data[cell] = landValue[0]   //r
    data[cell + 1] = landValue[1] //g
    data[cell + 2] = landValue[2]; //b
    //data[cell] += Math.max(0, (25 - value) * 8);
    data[cell + 3] = 255; // alpha.
  }
}

/* // Benchmark code.
start = Date.now();
for (var x = 0; x < 10000; x++) {
  for (var y = 0; y < 10000; y++) {
    noise.simplex2(x / 50, y/50);
  }
}*/
var end = Date.now();

ctx.fillColor = 'Black';
ctx.fillRect(0, 0, 0, 100);
ctx.putImageData(image, 0, 0);


ctx.font = '16px sans-serif'
ctx.textAlign = 'center';
ctx.fillText('Rendered in ' + (end - start) + ' ms', canvas.width / 2, canvas.height - 20);

if(console) {
  console.log('Rendered in ' + (end - start) + ' ms');
}
</script>
